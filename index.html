
## Opción B) GitHub Pages (una página que lo muestra infinitamente)
1) Crea un archivo `index.html` en tu repo y pega:

```html
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Te amo infinitamente</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:grid;
      place-items:center;
      background:#0b0b10;
      color:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow:hidden;
    }
    .msg{
      font-size: clamp(2rem, 7vw, 6rem);
      letter-spacing: .04em;
      animation: pulse 1.6s ease-in-out infinite;
      text-align:center;
      padding: 0 16px;
    }
    .sub{ opacity:.8; font-size: 1rem; margin-top: 10px; text-align:center;}
    @keyframes pulse{
      0%,100%{ transform: scale(1); opacity:.85; }
      50%{ transform: scale(1.08); opacity:1; }
    }
  </style>
</head>
<body>
  <div>
    <div class="msg">Te amo infinitamente ♾️</div>
    <div class="sub">— para ti, siempre.</div>
  </div>
</body>
</html>
